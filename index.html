<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>千树背单词</title>
    <link rel="stylesheet" href="css/style.css?v=20260705d">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body onload="loadDefaultWordPack()">
    <div class="container">
        <header class="site-header">
            <div class="site-brand">
                <i data-lucide="book-open"></i>
                <span>千树背单词</span>
            </div>
            <button id="theme-toggle" class="btn btn-icon btn-ghost" onclick="toggleTheme()" title="切换主题" aria-label="切换到深色模式">
                <span id="theme-icon-container"><i data-lucide="moon"></i></span>
            </button>
        </header>

        <!-- 首页 -->
        <div id="word-source-section" class="section home-section">
            <div class="home-intro">
                <p class="home-eyebrow">艾宾浩斯记忆曲线</p>
                <h1 class="home-headline">看中文，打出英文</h1>
            </div>

            <div class="pack-selector" role="tablist" aria-label="词包选择" aria-describedby="pack-selector-help">
                <button class="pack-tab active" data-pack="primary" role="tab" aria-selected="true" tabindex="0" onclick="switchWordPack('primary')" onkeydown="handlePackTabKeydown(event)">
                    小学英语
                </button>
                <button class="pack-tab" data-pack="computer" role="tab" aria-selected="false" tabindex="-1" onclick="switchWordPack('computer')" onkeydown="handlePackTabKeydown(event)">
                    计算机
                </button>
            </div>
            <p id="pack-selector-help" class="pack-help">使用 ←/→ 方向键切换词包。</p>

            <article class="home-workspace">
                <header class="workspace-header">
                    <h2 id="pack-title">小学英语全部</h2>
                    <span class="workspace-meta"><span id="pack-total-count">448</span> 词</span>
                </header>

                <div class="home-metrics">
                    <div class="metric-cell" role="group" data-metric-label="待复习" aria-label="待复习 0 词">
                        <span id="pack-review-count" class="metric-num">0</span>
                        <span class="metric-label">待复习</span>
                    </div>
                    <div class="metric-cell" role="group" data-metric-label="新词" aria-label="新词 0 词">
                        <span id="pack-new-count" class="metric-num">0</span>
                        <span class="metric-label">新词</span>
                    </div>
                    <div class="metric-cell" role="group" data-metric-label="错题" aria-label="错题 0 词">
                        <span id="pack-mistake-count" class="metric-num">0</span>
                        <span class="metric-label">错题</span>
                    </div>
                </div>

                <div class="home-actions" role="group" aria-labelledby="session-mode-heading" aria-describedby="session-mode-help">
                    <h3 id="session-mode-heading" class="sr-only">选择练习模式</h3>
                    <p id="session-mode-help" class="mode-help">使用 Tab 切换模式，按 Enter 或空格开始练习。</p>
                    <button class="btn btn-cta session-btn" onclick="startSession('quick')">
                        <span class="btn-label">小试牛刀</span>
                        <span class="btn-desc">20 词 · 混合练习</span>
                    </button>
                    <button class="btn btn-outline session-btn" onclick="startSession('challenge')">
                        <span class="btn-label">挑战模式</span>
                        <span class="btn-desc">每批 20 词</span>
                    </button>
                </div>
            </article>
        </div>

        <!-- 加载中提示 -->
        <div id="loading-section" class="section hidden" role="status" aria-live="polite" aria-busy="true">
            <div class="loading">
                <div class="spinner" aria-hidden="true"></div>
                <p>正在加载单词数据...</p>
            </div>
        </div>

        <!-- 练习区域 -->
        <div id="practice-section" class="section hidden">
            <!-- 统计信息 -->
            <div class="stats" role="region" aria-label="练习统计">
                <div class="stat-item">
                    <span class="stat-label">进度:</span>
                    <span id="progress-text">0/0</span>
                    <div class="progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-label="练习进度">
                        <div id="progress-fill" class="progress-fill"></div>
                    </div>
                </div>
                <div class="stat-item">
                    <span class="stat-label">正确率:</span>
                    <span id="accuracy-text">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">连续正确:</span>
                    <span id="streak-text">0</span>
                </div>
            </div>
            <div id="stats-live" class="sr-only" aria-live="polite" aria-atomic="true"></div>

            <!-- 单词显示区 -->
            <div class="word-display">
                <div class="chinese-word" id="chinese-word" aria-live="polite">加载中...</div>
            </div>

            <!-- 输入区域 -->
            <div class="input-area">
                <label for="word-input" class="sr-only">输入英文单词</label>
                <input
                    type="text"
                    id="word-input"
                    placeholder="在此输入英文单词..."
                    autocomplete="off"
                    autocapitalize="off"
                    autocorrect="off"
                    spellcheck="false"
                    aria-describedby="input-feedback"
                    oninput="checkInput()"
                    onkeydown="handleKeydown(event)"
                >
                <div id="input-feedback" class="input-feedback" aria-live="polite"></div>
            </div>

            <!-- 控制按钮 -->
            <div class="control-buttons">
                <button id="peek-answer-btn" class="btn btn-secondary" onclick="toggleAlwaysShowAnswer()" onmouseenter="peekAnswer()" onmouseleave="hidePeekAnswer()" title="悬停即可查看答案，点击开启常显模式" aria-label="显示答案" aria-pressed="false">显示答案</button>
                <button id="end-challenge-button" class="btn btn-warning hidden" onclick="endChallenge()">结束练习</button>
                <button class="btn btn-warning" onclick="backToSource()">返回首页</button>
                <button id="pronunciation-toggle" class="btn btn-icon" onclick="togglePronunciation()" title="发音开关" aria-label="关闭发音" aria-pressed="true">
                    <span id="pronunciation-icon-container"><i data-lucide="audio-lines"></i></span>
                </button>
                <button id="sound-toggle" class="btn btn-icon" onclick="toggleSound()" title="音效开关" aria-label="关闭音效" aria-pressed="true">
                    <span id="sound-icon-container"><i data-lucide="volume-2"></i></span>
                </button>
            </div>

            <!-- 答案显示 -->
            <div id="answer-display" class="answer-display hidden">
                <div class="correct-answer">
                    <span class="answer-label">正确答案:</span>
                    <span id="correct-word" class="word-text"></span>
                </div>
                <button class="btn btn-primary" onclick="nextWord()">下一个 →</button>
            </div>
        </div>

        <!-- Session 小结页 -->
        <div id="complete-section" class="section hidden">
            <div id="complete-live" class="sr-only" aria-live="polite" aria-atomic="true"></div>
            <div class="complete-message">
                <h2 id="complete-title">本轮完成！</h2>
                <p id="complete-text">本轮练习完成！</p>
                <p id="complete-batch-info" class="complete-subtitle hidden"></p>
                <div class="complete-stats">
                    <div class="stat">
                        <span class="stat-value" id="complete-total">0</span>
                        <span class="stat-name">总单词</span>
                    </div>
                    <div class="stat">
                        <span class="stat-value" id="complete-correct">0</span>
                        <span class="stat-name">正确</span>
                    </div>
                    <div class="stat">
                        <span class="stat-value" id="complete-accuracy">0%</span>
                        <span class="stat-name">正确率</span>
                    </div>
                </div>
                <div class="complete-word-breakdown">
                    <div class="breakdown-item">
                        <span class="breakdown-value" id="complete-new">0</span>
                        <span class="breakdown-label">新词</span>
                    </div>
                    <div class="breakdown-item">
                        <span class="breakdown-value" id="complete-review">0</span>
                        <span class="breakdown-label">复习</span>
                    </div>
                    <div class="breakdown-item">
                        <span class="breakdown-value" id="complete-mistake">0</span>
                        <span class="breakdown-label">错题</span>
                    </div>
                </div>
                <div class="complete-actions">
                    <button class="btn btn-primary" onclick="repeatLastSession()">再来一轮</button>
                    <button class="btn btn-secondary" onclick="backToSource()">返回首页</button>
                </div>
            </div>
        </div>

        <!-- 单词列表 -->
        <div id="word-list-section" class="section hidden">
            <h2>单词列表</h2>
            <div id="word-list-content"></div>
            <button class="btn btn-secondary" onclick="backToPractice()">返回练习</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
    <script src="js/memory.js?v=20260705d"></script>
    <script src="js/feed-builder.js?v=20260705d"></script>
    <script src="js/data-loader.js?v=20260705g"></script>
    <script src="js/sound-effects.js?v=20260705"></script>
    <script src="js/pronunciation.js?v=20260705"></script>
    <script src="js/typing-game.js?v=20260705g"></script>
</body>
</html>
