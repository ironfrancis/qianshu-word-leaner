<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>千树背单词</title>
    <link rel="stylesheet" href="css/style.css?v=20260705">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body onload="loadDefaultWordPack()">
    <div class="container">
        <header>
            <h1><i data-lucide="book-open"></i> 千树背单词</h1>
            <p class="subtitle">小学英语单词学习 - 艾宾浩斯记忆曲线</p>
        </header>

        <!-- 词包选择 -->
        <div id="word-source-section" class="section">
            <div class="pack-selector">
                <button class="pack-tab active" data-pack="primary" onclick="switchWordPack('primary')">
                    小学英语全部
                </button>
                <button class="pack-tab" data-pack="computer" onclick="switchWordPack('computer')">
                    计算机兴趣词包
                </button>
            </div>
            <h2 id="pack-title">小学英语全部</h2>
            <div class="pack-card">
                <p class="pack-subtitle"><span id="pack-total-count">448</span> 个单词</p>
                <div class="pack-stats">
                    <span>待复习 <strong id="pack-review-count">0</strong></span>
                    <span>新词 <strong id="pack-new-count">0</strong></span>
                    <span>错题 <strong id="pack-mistake-count">0</strong></span>
                </div>
                <div class="session-buttons">
                    <button class="btn btn-primary session-btn" onclick="startSession('quick')">
                        小试牛刀 · 20 词
                    </button>
                    <button class="btn btn-success session-btn" onclick="startSession('challenge')">
                        挑战模式 · 每批 20 词
                    </button>
                </div>
            </div>
        </div>

        <!-- 加载中提示 -->
        <div id="loading-section" class="section hidden">
            <div class="loading">
                <div class="spinner"></div>
                <p>正在加载单词数据...</p>
            </div>
        </div>

        <!-- 练习区域 -->
        <div id="practice-section" class="section hidden">
            <!-- 统计信息 -->
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-label">进度:</span>
                    <span id="progress-text">0/0</span>
                    <div class="progress-bar">
                        <div id="progress-fill" class="progress-fill"></div>
                    </div>
                </div>
                <div class="stat-item">
                    <span class="stat-label">正确率:</span>
                    <span id="accuracy-text">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">连续正确:</span>
                    <span id="streak-text">0</span>
                </div>
            </div>

            <!-- 单词显示区 -->
            <div class="word-display">
                <div class="chinese-word" id="chinese-word">加载中...</div>
            </div>

            <!-- 输入区域 -->
            <div class="input-area">
                <input
                    type="text"
                    id="word-input"
                    placeholder="在此输入英文单词..."
                    autocomplete="off"
                    autocapitalize="off"
                    autocorrect="off"
                    spellcheck="false"
                    oninput="checkInput()"
                    onkeydown="handleKeydown(event)"
                >
                <div id="input-feedback" class="input-feedback"></div>
            </div>

            <!-- 控制按钮 -->
            <div class="control-buttons">
                <button id="peek-answer-btn" class="btn btn-secondary" onclick="toggleAlwaysShowAnswer()" onmouseenter="peekAnswer()" onmouseleave="hidePeekAnswer()" title="悬停即可查看答案，点击开启常显模式">显示答案</button>
                <button id="end-challenge-button" class="btn btn-warning hidden" onclick="endChallenge()">结束练习</button>
                <button class="btn btn-warning" onclick="backToSource()">返回首页</button>
                <button id="pronunciation-toggle" class="btn btn-icon" onclick="togglePronunciation()" title="发音开关">
                    <span id="pronunciation-icon-container"><i data-lucide="audio-lines"></i></span>
                </button>
                <button id="sound-toggle" class="btn btn-icon" onclick="toggleSound()" title="音效开关">
                    <span id="sound-icon-container"><i data-lucide="volume-2"></i></span>
                </button>
                <button id="theme-toggle" class="btn btn-icon" onclick="toggleTheme()" title="切换主题">
                    <span id="theme-icon-container"><i data-lucide="moon"></i></span>
                </button>
            </div>

            <!-- 答案显示 -->
            <div id="answer-display" class="answer-display hidden">
                <div class="correct-answer">
                    <span class="answer-label">正确答案:</span>
                    <span id="correct-word" class="word-text"></span>
                </div>
                <button class="btn btn-primary" onclick="nextWord()">下一个 →</button>
            </div>
        </div>

        <!-- Session 小结页 -->
        <div id="complete-section" class="section hidden">
            <div class="complete-message">
                <h2 id="complete-title">本轮完成！</h2>
                <p id="complete-text">本轮练习完成！</p>
                <p id="complete-batch-info" class="complete-subtitle hidden"></p>
                <div class="complete-stats">
                    <div class="stat">
                        <span class="stat-value" id="complete-total">0</span>
                        <span class="stat-name">总单词</span>
                    </div>
                    <div class="stat">
                        <span class="stat-value" id="complete-correct">0</span>
                        <span class="stat-name">正确</span>
                    </div>
                    <div class="stat">
                        <span class="stat-value" id="complete-accuracy">0%</span>
                        <span class="stat-name">正确率</span>
                    </div>
                </div>
                <div class="complete-word-breakdown">
                    <div class="breakdown-item">
                        <span class="breakdown-value" id="complete-new">0</span>
                        <span class="breakdown-label">新词</span>
                    </div>
                    <div class="breakdown-item">
                        <span class="breakdown-value" id="complete-review">0</span>
                        <span class="breakdown-label">复习</span>
                    </div>
                    <div class="breakdown-item">
                        <span class="breakdown-value" id="complete-mistake">0</span>
                        <span class="breakdown-label">错题</span>
                    </div>
                </div>
                <div class="complete-actions">
                    <button class="btn btn-primary" onclick="repeatLastSession()">再来一轮</button>
                    <button class="btn btn-secondary" onclick="backToSource()">返回首页</button>
                </div>
            </div>
        </div>

        <!-- 单词列表 -->
        <div id="word-list-section" class="section hidden">
            <h2>单词列表</h2>
            <div id="word-list-content"></div>
            <button class="btn btn-secondary" onclick="backToPractice()">返回练习</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
    <script src="js/memory.js?v=20260705"></script>
    <script src="js/feed-builder.js?v=20260705"></script>
    <script src="js/data-loader.js?v=20260705"></script>
    <script src="js/sound-effects.js?v=20260705"></script>
    <script src="js/pronunciation.js?v=20260705"></script>
    <script src="js/typing-game.js?v=20260705"></script>
</body>
</html>
