# Deploy static content to GitHub Pages
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry_2.outputs.page_url || steps.deployment_retry_3.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare site artifact
        run: |
          mkdir -p _site
          cp index.html .nojekyll _site/
          cp -r css js data assets sounds _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Retry Pages deployment (2/3)
        if: steps.deployment.outcome != 'success'
        id: deployment_retry_2
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Retry Pages deployment (3/3)
        if: steps.deployment.outcome != 'success' && steps.deployment_retry_2.outcome != 'success'
        id: deployment_retry_3
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Verify deployment
        if: steps.deployment.outcome != 'success' && steps.deployment_retry_2.outcome != 'success' && steps.deployment_retry_3.outcome != 'success'
        run: |
          echo "::error::GitHub Pages deployment failed after 3 attempts."
          exit 1
